services:
  postgres:
    image: pgvector/pgvector:pg16   # NOT plain postgres:16 — needs the vector extension baked in
    environment:
      POSTGRES_DB: ${DB_NAME:-ragdb}
      POSTGRES_USER: ${DB_USER:-ragadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ragpass}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ragadmin} -d ${DB_NAME:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - rag_pg_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - rag_ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init job: pulls the embedding model into the ollama volume, then exits.
  # Only needs to run once — subsequent restarts find the model already cached.
  ollama-pull:
    image: ollama/ollama:latest
    labels:
      org.springframework.boot.ignore: true   # same image as `ollama`
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull nomic-embed-text"]

volumes:
  rag_pg_data:
  rag_ollama_data: